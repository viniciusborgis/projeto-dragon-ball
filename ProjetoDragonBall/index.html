<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Dragon Ball</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header>
            <img class="tela" src="Imagens/tela.png" alt="Logo Dragon Ball clássico">
            <p class="score">Score: 0</p>
        </header>

        <main>
            <section class="pai">
                <button type="button" class="jogar">Jogar</button>
            </section>

            <article class="game-area">
                <img class="cauda" src="Imagens/Cauda.gif" alt="Rastro da nuvem">
                <img class="goku" src="Imagens/gifGoku.gif" alt="Goku na Nuvem Voadora">

                <div class="nuvens">
                    <img class="nuvem" src="Imagens/nuvemNegra.png" alt="Obstáculo">
                    <img class="nuvem" src="Imagens/nuvemNegra.png" alt="Obstáculo">
                    <img class="nuvem" src="Imagens/nuvemNegra.png" alt="Obstáculo">
                </div>
            </article>

            <section class="desaparece">
                <h2 class="gameOver">Game Over</h2>
                <p class="score-final">Você fez 0 pontos!</p>
                <div class="pai2">
                    <button type="button" class="jogarNov">Jogar novamente</button>
                </div>
            </section>
        </main>

        <footer>
            <section class="redes">
                <a href="https://www.tiktok.com/@viniciussborgis" target="_blank" rel="noopener"><img class="icones" src="Imagens/tiktok.png" alt="TikTok"></a>
                <a href="https://www.instagram.com/viniciussborges" target="_blank" rel="noopener"><img class="icones" src="Imagens/instagram.png" alt="Instagram"></a>
                <a href="https://github.com/viniciussborges" target="_blank" rel="noopener"><img class="icones" src="Imagens/github.png" alt="GitHub"></a>
            </section>
            <p class="creditos">Desenvolvido por <br> <span>Vinícius Borges</span></p>
        </footer>

        <div class="background" aria-hidden="true"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
